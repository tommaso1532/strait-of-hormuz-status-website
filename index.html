<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strait of Hormuz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1.5rem;
    }

    #label {
      font-size: clamp(12px, 1.8vw, 16px);
      color: #888;
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    #status {
      font-size: clamp(72px, 18vw, 220px);
      font-weight: bold;
      letter-spacing: 0.05em;
      line-height: 1;
      transition: color 0.3s ease;
    }

    #status.open    { color: #00ff88; }
    #status.closed  { color: #ff3333; }
    #status.unknown { color: #555; }
    #status.loading { color: #222; }

    #meta {
      font-size: clamp(10px, 1vw, 12px);
      color: #777;
      letter-spacing: 0.12em;
      text-align: center;
      max-width: 600px;
    }
  </style>
</head>
<body>
  <div id="label">STRAIT OF HORMUZ</div>
  <div id="status" class="loading">···</div>
  <div id="meta"></div>

  <script>
    async function loadStatus() {
      const statusEl = document.getElementById('status');
      const metaEl = document.getElementById('meta');

      try {
        const res = await fetch('/api/status');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const VALID_STATUSES = new Set(['open', 'closed', 'unknown']);
        const raw = typeof data.status === 'string' ? data.status.toUpperCase() : 'UNKNOWN';
        const key = raw.toLowerCase();
        statusEl.textContent = VALID_STATUSES.has(key) ? raw : 'UNKNOWN';
        statusEl.className   = VALID_STATUSES.has(key) ? key : 'unknown';

        const rawDate = new Date(data.checkedAt);
        const time = isNaN(rawDate.getTime()) ? 'unknown time' : rawDate.toLocaleString(undefined, {
          dateStyle: 'medium', timeStyle: 'short'
        });
        const sources = Array.isArray(data.sources) && data.sources.length
          ? data.sources.join(' + ')
          : 'no data';
        metaEl.textContent = `confidence: ${data.confidence} · sources: ${sources} · ${time}`;
      } catch {
        statusEl.textContent = 'UNKNOWN';
        statusEl.className = 'unknown';
        metaEl.textContent = 'could not retrieve status — refresh to try again';
      }
    }

    loadStatus();
  </script>
</body>
</html>
